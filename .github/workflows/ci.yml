name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  pack:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn pack
      - uses: actions/upload-artifact@v4
        with:
          name: package
          path: '*.tgz'

  biome:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint

  typescript:
    name: Lint (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn typecheck

  unit:
    name: Unit tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node:
          - 20
          - 22
          - 24
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn test

  browser:
    name: Browser tests
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: yarn install --immutable
      - name: Ensure Transloadit secrets
        run: |
          missing=()
          if [ -z "${TRANSLOADIT_KEY}" ]; then
            missing+=("TRANSLOADIT_KEY")
          fi
          if [ -z "${TRANSLOADIT_SECRET}" ]; then
            missing+=("TRANSLOADIT_SECRET")
          fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing secrets: ${missing[*]}" >&2
            exit 1
          fi
        env:
          TRANSLOADIT_KEY: ${{ secrets.TRANSLOADIT_KEY }}
          TRANSLOADIT_SECRET: ${{ secrets.TRANSLOADIT_SECRET }}
      - run: yarn exec playwright install --with-deps chromium
      - run: yarn verify:local
        env:
          PLAYWRIGHT_SKIP_INSTALL: "1"
          TRANSLOADIT_KEY: ${{ secrets.TRANSLOADIT_KEY }}
          TRANSLOADIT_SECRET: ${{ secrets.TRANSLOADIT_SECRET }}

  convex-qa:
    name: Convex deployment QA
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: yarn install --immutable
      - name: Ensure cloud QA secrets
        run: |
          missing=()
          if [ -z "${E2E_REMOTE_APP_URL}" ]; then
            missing+=("E2E_REMOTE_APP_URL")
          fi
          if [ -z "${CONVEX_URL}" ]; then
            missing+=("CONVEX_URL")
          fi
          if [ -z "${CONVEX_ADMIN_KEY}" ]; then
            missing+=("CONVEX_ADMIN_KEY")
          fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing secrets: ${missing[*]}" >&2
            exit 1
          fi
        env:
          E2E_REMOTE_APP_URL: ${{ secrets.E2E_REMOTE_APP_URL }}
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_ADMIN_KEY: ${{ secrets.CONVEX_ADMIN_KEY }}
      - run: yarn verify:cloud
        env:
          E2E_REMOTE_APP_URL: ${{ secrets.E2E_REMOTE_APP_URL }}
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_ADMIN_KEY: ${{ secrets.CONVEX_ADMIN_KEY }}

  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs:
      - pack
      - biome
      - typescript
      - unit
      - browser
      - convex-qa
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: softprops/action-gh-release@v1
        with:
          draft: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Check if version already published
        id: npm_check
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view @transloadit/convex@"${VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v4
        with:
          name: package
          path: .
      - run: npm install -g npm@^11.5.1
      - run: npm publish *.tgz --provenance
        if: steps.npm_check.outputs.already_published != 'true'

  deploy-example:
    name: Deploy example (Vercel)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - pack
      - biome
      - typescript
      - unit
      - browser
      - convex-qa
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          if [ -z "${VERCEL_DEPLOY_HOOK}" ]; then
            echo "VERCEL_DEPLOY_HOOK missing" >&2
            exit 1
          fi
          curl -fsSL -X POST "${VERCEL_DEPLOY_HOOK}"
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
